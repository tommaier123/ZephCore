# SPDX-License-Identifier: MIT
# LilyGo T3S3 v1.x — ESP32-S3 + SX1262
#
# Hardware:
# - ESP32-S3 (8MB flash, 8MB PSRAM, BLE 5.0)
# - SX1262 LoRa on SPI2: NSS=GPIO7, DIO1=GPIO33, BUSY=GPIO34,
#   RESET=GPIO8, TX LED=GPIO37
# - SCLK=GPIO5, MISO=GPIO3, MOSI=GPIO6
# - TCXO 1.8V, DIO2 as TX enable, RX boosted
# - SSD1306 128x64 OLED on I2C0: SDA=GPIO18, SCL=GPIO17, RST=GPIO21
# - User button GPIO0, battery ADC GPIO1
# - PSRAM: ESP32-S3R8 is silicon-strapped OPI octal
#
# Include order: prj.conf → zephcore_common.conf → esp32_common.conf → board.conf

# Board identification
CONFIG_ZEPHCORE_BOARD_NAME="LILYGO T3S3"

# Device Information Service model name
CONFIG_BT_DIS_MODEL_NUMBER_STR="LILYGO T3S3"

# PSRAM mode — ESP32-S3R8 is silicon-strapped OPI octal.
# Enable is auto-detected from DTS by Kconfig.psram; only the mode is set here.
CONFIG_SPIRAM_MODE_OCT=y

# Flash size — 8MB (override esp32_common.conf 4MB default)
CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y