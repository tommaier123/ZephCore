# LilyGo T-Beam v1.2 — ESP32 (PICO-D4) + SX1262
#
# Hardware:
#   ESP32-PICO-D4 (4MB flash)
#   SX1262 on SPI3 (DIO2 RF switch, 1.8V TCXO via DIO3)
#   SSD1306 128x64 OLED on I2C0
#   AXP2101 PMU — powers LoRa (ALDO2) and GPS (ALDO3) rails, battery fuel gauge
#   NEO-6M / NEO-M8N GNSS on UART1
#
# Upstream Zephyr board: lilygo/ttgo_tbeam — that DTS models the SX1276 radio
# variant; board.overlay overrides the radio to a native SX1262 on the same
# SPI3 wiring. The AXP2101 MFD + regulator + fuel-gauge drivers are stock
# Zephyr and auto-enable from the upstream DTS PMU nodes.
#
# Include order: prj.conf -> zephcore_common.conf -> esp32_common.conf -> board.conf

# Board identification
CONFIG_ZEPHCORE_BOARD_NAME="LilyGo T-Beam"
CONFIG_BT_DIS_MODEL_NUMBER_STR="LilyGo T-Beam v1.2"

# SX1262 — 22 dBm default TX power (matches Arduino LORA_TX_POWER)
CONFIG_ZEPHCORE_DEFAULT_TX_POWER_DBM=22

# Battery via the AXP2101 fuel-gauge subsystem (voltage + state-of-charge over
# I2C). CONFIG_REGULATOR (zephcore_common.conf) plus the AXP2101 MFD/regulator
# drivers default-enable from the devicetree PMU nodes and bring the LoRa/GPS
# rails up at boot from their regulator-boot-on/always-on properties.
CONFIG_FUEL_GAUGE=y

# Flash mode: ESP32-PICO-D4 — use DIO, not QIO. PICO-D4 rev 1.0 hangs in the
# QIO-enable SPI sequence (RTCWDT bootloop), same as handled for ttgo_lora32.
CONFIG_ESPTOOLPY_FLASHMODE_QIO=n
CONFIG_ESPTOOLPY_FLASHMODE_DIO=y

# Companion RAM budget — the classic ESP32 has a much smaller contiguous DRAM
# segment than the ESP32-S3 boards, and the default contact/queue arrays
# (350/256) overflow it. Use the Arduino MeshCore T-Beam companion sizes.
CONFIG_ZEPHCORE_MAX_CONTACTS=160
CONFIG_ZEPHCORE_MAX_CHANNELS=8
CONFIG_ZEPHCORE_OFFLINE_QUEUE_SIZE=128
