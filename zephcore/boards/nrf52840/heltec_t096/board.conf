# Heltec Mesh Node T096 - nRF52840 + SX1262 + UC6580 GNSS
# Board-specific configuration
#
# Hardware:
# - nRF52840 SoC, SX1262 LoRa, KCT8103L PA/FEM
# - UC6580 GNSS on UART0 at 115200 baud
# - Battery ADC on AIN1 (P0.03), 390K/100K divider, enable P1.15
# - I2C0 header bus (SDA=P0.07, SCL=P0.08)
# - LED: P0.28 (active-HIGH)
# - Button: P1.10 (active-LOW)
# - ST7735S 0.96" 160x80 TFT (SPI3, MIPI-DBI, mono-tft wrapper)
# - External SPI flash footprint present but device is not identified/enabled
# - No buzzer/audio hardware

# Board identification (matches Arduino MeshCore variant name)
CONFIG_ZEPHCORE_BOARD_NAME="Heltec T096"

# Device Information Service model name
CONFIG_BT_DIS_MODEL_NUMBER_STR="Heltec Mesh Node T096"

# SoftDevice firmware ID (s140 v6.1.1)
CONFIG_ZEPHCORE_SD_FWID=0x00B6

# KCT8103L PA/FEM. MeshCore's T096 target uses 9 dBm SX1262 input for about
# 22 dBm at the antenna; keep ZephCore's boot default conservative.
CONFIG_ZEPHCORE_DEFAULT_TX_POWER_DBM=9

# Same KCT8103L-class Heltec PA path as the V4.3 boards.
CONFIG_ZEPHCORE_SX126X_HELTEC_REG_PATCH=y

# ========== RAM budget ==========
# CFB mono-tft framebuffer = 160x80/8 = 1600 bytes, allocated from k_malloc.
# Default heap (2048) is sized tightly for SSD1306 128x64 (1024 bytes).
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Single-button board with longpress filter: a "double long-press" is
# physically slower than 500 ms, so widen the confirmation window.
CONFIG_ZEPHCORE_UI_CONFIRM_WINDOW_MS=3000

# T096 has no buzzer. Keep notification audio disabled and omit the buzzer UI page.
CONFIG_ZEPHCORE_UI_BUZZER=n
