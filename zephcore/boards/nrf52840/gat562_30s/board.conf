# GAT562 30S Mesh Kit (nRF52840 + SX1262)
#
# Built on the RAK4631 core module with a 30 dBm (1 W) external PA. The SX1262
# is driven at the ZephCore default 22 dBm; the onboard PA brings the antenna
# output up to ~30 dBm. DIO2 keys the T/R switch, DIO3 supplies the 1.8 V TCXO
# (see gat562_30s.dts). Flash layout matches RAK4631 (SoftDevice s140 v6,
# app @ 0x26000), so the stock UF2 bootloader is reused — no re-flash needed.
#
# Most features are auto-detected from devicetree:
#   - PWM + buzzer            (buzzer nodelabel)
#   - SSD1306 OLED            (zephyr,display chosen)  -> also UI_DISPLAY below
#   - LoRa RX duty cycle      (companion + SX1262)
#   - battery ADC, GPS, LEDs, user button

# Board identification
CONFIG_ZEPHCORE_BOARD_NAME="GAT562 30S Mesh Kit"
CONFIG_BT_DIS_MODEL_NUMBER_STR="GAT562_30S"

# SoftDevice firmware ID (s140 v6.1.1 — same as RAK4631)
CONFIG_ZEPHCORE_SD_FWID=0x00B6

# Compile in the UI display stack; the OLED panel is optional at runtime.
CONFIG_ZEPHCORE_UI_DISPLAY=y

# GPS: AT6558R UART NMEA receiver on UART0 @ 9600 baud (P0.15 RX / P0.16 TX),
# powered by the WB_IO2/P1.02 gpio-hog (see gat562_30s.dts). The
# gnss-nmea-generic driver is auto-selected from the DTS node; CONFIG_GNSS and
# CONFIG_MODEM_MODULES come from boards/common/zephcore_common.conf.
#
# Use the async (DMA) UART receive path for the GPS: nRF UARTE's interrupt-
# driven RX did not feed modem_backend_uart reliably here, so the modem chat
# never saw any NMEA. CONFIG_UART_ASYNC_API switches the backend to its
# DMA-based receiver, which delivers the stream correctly.
CONFIG_UART_ASYNC_API=y
